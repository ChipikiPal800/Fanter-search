<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter Search | Browse Freely</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.2s ease;
      overflow-x: hidden;
      position: relative;
    }

    body.light { background: #e8e8e8; color: #1a2e1a; }
    body.dark { background: #1a1a1a; color: #e0e0e0; }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .main-content.has-iframe { justify-content: flex-start; padding-top: 20px; }

    /* Theme Toggle - Bottom Left */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(30, 30, 35, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 13px;
      color: #e0e0e0;
      z-index: 100;
    }

    body.light .theme-toggle {
      background: rgba(220, 220, 220, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
      color: #1a2e1a;
    }

    .title {
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4a6e4a, #6a8e6a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      text-align: center;
    }

    body.dark .title {
      background: linear-gradient(135deg, #6a8e6a, #8aae8a);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .search-section {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      transition: all 0.4s ease;
      text-align: center;
    }

    .main-content.has-iframe .search-section {
      max-width: 500px;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .search-wrapper {
      background: white;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      padding: 6px;
      transition: all 0.3s;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.dark .search-wrapper {
      background: #2a2a2a;
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .search-wrapper input {
      flex: 1;
      border: none;
      padding: 16px 24px;
      font-size: 1rem;
      background: transparent;
      outline: none;
      font-family: inherit;
      color: #1a2e1a;
    }

    body.dark .search-wrapper input { color: #e0e0e0; }

    .search-wrapper input::placeholder {
      color: #a3c2a3;
      font-style: italic;
    }

    body.dark .search-wrapper input::placeholder { color: #6a7a6a; }

    .search-wrapper button {
      background: #4a6e4a;
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .search-wrapper button:hover {
      background: #3a5e3a;
      transform: scale(0.97);
    }

    /* Dropdown */
    .dropdown-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
    }

    .dropdown-trigger {
      background: rgba(30, 30, 35, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    body.light .dropdown-trigger {
      background: rgba(220, 220, 220, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
      color: #1a2e1a;
    }

    body.dark .dropdown-trigger { color: #e0e0e0; }

    .dropdown-arrow { transition: transform 0.3s ease; }
    .dropdown-arrow.open { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: 60px;
      right: 0;
      width: 280px;
      background: #2a2a2a;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    body.light .dropdown-menu {
      background: white;
      border-color: rgba(0, 0, 0, 0.06);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .dropdown-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .quicklink-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
    }

    body.light .quicklink-item {
      border-bottom-color: #f0f0f0;
      color: #1a2e1a;
    }

    .quicklink-item:hover { background: rgba(255, 255, 255, 0.1); }
    body.light .quicklink-item:hover { background: #f4fbf4; }

    .quicklink-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 6px;
    }

    .quicklink-name { font-weight: 500; flex: 1; }

    /* Iframe Container */
    .iframe-container {
      width: 90%;
      max-width: 1300px;
      margin: 30px auto 20px;
      border-radius: 24px;
      background: #1a1a1a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transform: scale(0.95);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      pointer-events: none;
    }

    body.light .iframe-container {
      background: white;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .iframe-container.visible {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .iframe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
    }

    body.light .iframe-header {
      background: #f8faf8;
      border-bottom-color: #e0ede0;
    }

    .iframe-url {
      font-size: 13px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      color: #8aaa8a;
    }

    body.light .iframe-url { color: #4a674a; }

    .iframe-buttons { display: flex; gap: 12px; }

    .iframe-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 30px;
      transition: all 0.2s;
      color: #8aaa8a;
      font-weight: 500;
    }

    .iframe-btn:hover { background: #3a4a3a; }
    body.light .iframe-btn { color: #4a674a; }
    body.light .iframe-btn:hover { background: #e0ede0; }

    iframe {
      width: 100%;
      height: 65vh;
      border: none;
      display: block;
    }

    .iframe-container.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      border-radius: 0;
      z-index: 1000;
    }

    .iframe-container.fullscreen iframe { height: 100vh; }

    .cursor-lock-hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      pointer-events: none;
      z-index: 1100;
      opacity: 0;
      transition: opacity 0.3s;
      font-family: monospace;
    }

    .cursor-lock-hint.visible { opacity: 1; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74, 110, 74, 0.2);
      border-top-color: #4a6e4a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bypass method selector */
    .bypass-selector {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(30, 30, 35, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 12px;
      color: #e0e0e0;
      z-index: 100;
    }

    body.light .bypass-selector {
      background: rgba(220, 220, 220, 0.9);
      border-color: rgba(0, 0, 0, 0.1);
      color: #1a2e1a;
    }

    .bypass-selector select {
      background: transparent;
      border: none;
      color: inherit;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    @media (max-width: 680px) {
      .title { font-size: 2rem; }
      .search-wrapper input { padding: 12px 18px; }
      .dropdown-menu { width: 260px; }
      .bypass-selector { bottom: 80px; }
    }
  </style>
</head>
<body class="dark">
  <canvas id="bgCanvas"></canvas>

  <!-- Theme Toggle - Bottom Left -->
  <div class="theme-toggle" id="themeToggle">🌓 Dark/Light</div>

  <!-- Bypass Method Selector - Bottom Right -->
  <div class="bypass-selector">
    <span>🔓 Bypass method: </span>
    <select id="bypassMethod">
      <option value="blank">about:blank</option>
      <option value="popup">JavaScript Popup</option>
      <option value="data">data: URL</option>
      <option value="direct">Direct Tab</option>
    </select>
  </div>

  <!-- Dropdown Menu -->
  <div class="dropdown-container">
    <div class="dropdown-trigger" id="dropdownTrigger">
      <span>⚡ Quick Links</span>
      <span class="dropdown-arrow" id="dropdownArrow">▼</span>
    </div>
    <div class="dropdown-menu" id="dropdownMenu"></div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="search-section">
      <div class="title">Fanter Search</div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="type a link here, everythings unblocked :3">
        <button id="goBtn">Go</button>
      </div>
    </div>

    <div class="iframe-container" id="iframeContainer">
      <div class="iframe-header">
        <span class="iframe-url" id="iframeUrl">Ready</span>
        <div class="iframe-buttons">
          <button class="iframe-btn" id="directTabBtn" title="Open with selected bypass method">🔓 Bypass</button>
          <button class="iframe-btn" id="fullscreenBtn" title="Fullscreen (cursor locked)">⛶</button>
          <button class="iframe-btn" id="refreshBtn" title="Refresh">⟳</button>
        </div>
      </div>
      <iframe id="proxyFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
    </div>
  </div>

  <div class="cursor-lock-hint" id="cursorLockHint">🔒 Press ESC to exit fullscreen / unlock cursor</div>

  <script>
    // ============================================================
    // FANTER SEARCH — TRUE about:blank BYPASS
    // ============================================================
    
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let points = [], time = 0;

    function initPoints() {
      const width = window.innerWidth, height = window.innerHeight;
      canvas.width = width; canvas.height = height;
      const cols = Math.floor(width / 70), rows = Math.floor(height / 70);
      points = [];
      for (let i = 0; i <= cols; i++) {
        for (let j = 0; j <= rows; j++) {
          points.push({
            baseX: i * 70, baseY: j * 70, offsetX: 0, offsetY: 0,
            phaseX: Math.random() * Math.PI * 2, phaseY: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 0.8
          });
        }
      }
    }

    function drawBackground() {
      if (!ctx) return;
      const isDark = document.body.classList.contains('dark');
      ctx.fillStyle = isDark ? '#1c1c1c' : '#d8d8d8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let p of points) {
        p.offsetX = Math.sin(time * 0.002 * p.speed + p.phaseX) * 12;
        p.offsetY = Math.cos(time * 0.002 * p.speed * 0.7 + p.phaseY) * 12;
      }
      
      ctx.beginPath();
      ctx.strokeStyle = isDark ? 'rgba(100, 100, 100, 0.25)' : 'rgba(120, 120, 120, 0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = (points[i].baseX + points[i].offsetX) - (points[j].baseX + points[j].offsetX);
          const dy = (points[i].baseY + points[i].offsetY) - (points[j].baseY + points[j].offsetY);
          if (Math.sqrt(dx * dx + dy * dy) < 100) {
            ctx.beginPath();
            ctx.moveTo(points[i].baseX + points[i].offsetX, points[i].baseY + points[i].offsetY);
            ctx.lineTo(points[j].baseX + points[j].offsetX, points[j].baseY + points[j].offsetY);
            ctx.stroke();
          }
        }
      }
      
      ctx.fillStyle = isDark ? 'rgba(160, 160, 160, 0.35)' : 'rgba(100, 100, 100, 0.3)';
      for (let p of points) {
        ctx.beginPath();
        ctx.arc(p.baseX + p.offsetX, p.baseY + p.offsetY, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animateBackground() { time++; drawBackground(); requestAnimationFrame(animateBackground); }
    window.addEventListener('resize', () => { initPoints(); drawBackground(); });

    // QuickLinks
    const quickLinks = [
      { name: 'YouTube', url: 'youtube.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdYYtpbk4xqsn2XvBocnTZjLJH2vsbPhYbRQ&s' },
      { name: 'Reddit', url: 'reddit.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYw6dBUuV1YaVQ3oSdn0xDl4SwmtCn2dKKiA&s' },
      { name: 'Cloudmoon', url: 'cloudmoonapp.com', icon: 'https://img.utdstc.com/icon/12d/349/12d349d1cd13cc225122ccd090b211e69c79a84c5216e55689f55f382235e423:200' },
      { name: 'Spotify', url: 'spotify.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQP-SeOb6iBTaeMUiL_lj3ac3LKNYP5foHCAg&s' },
      { name: 'now.gg', url: 'now.gg', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRduQjU8n0k3kzifCT8BUXSGpg-hYRdxMUX5A&s' },
      { name: 'Xbox Cloud', url: 'xbox.com/play', icon: 'https://assets.play.xbox.com/playxbox/static/media/CloudGaming_LetterBox.scale-200.ef909bf4.png' },
      { name: 'GeForce NOW', url: 'play.geforcenow.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjQnPCY_I0L4_-bLIdU0CcuVkYTAPICicosQ&s' }
    ];

    // Proxy
    const PROXY_URL = 'https://fanter-search-proxy.onrender.com/proxy?url=';
    const FALLBACK_PROXIES = ['https://corsproxy.io/?url=', 'https://cors-anywhere.herokuapp.com/'];
    let currentUrl = '';

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const goBtn = document.getElementById('goBtn');
    const iframeContainer = document.getElementById('iframeContainer');
    const proxyFrame = document.getElementById('proxyFrame');
    const iframeUrlSpan = document.getElementById('iframeUrl');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const directTabBtn = document.getElementById('directTabBtn');
    const mainContent = document.getElementById('mainContent');
    const cursorLockHint = document.getElementById('cursorLockHint');
    const themeToggle = document.getElementById('themeToggle');
    const bypassMethodSelect = document.getElementById('bypassMethod');
    
    const dropdownTrigger = document.getElementById('dropdownTrigger');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const dropdownArrow = document.getElementById('dropdownArrow');

    // Theme
    function initTheme() {
      const saved = localStorage.getItem('fanterTheme');
      if (saved === 'light') { document.body.classList.remove('dark'); document.body.classList.add('light'); }
      else { document.body.classList.remove('light'); document.body.classList.add('dark'); }
      drawBackground();
    }
    themeToggle.addEventListener('click', () => {
      if (document.body.classList.contains('dark')) {
        document.body.classList.remove('dark'); document.body.classList.add('light');
        localStorage.setItem('fanterTheme', 'light');
      } else {
        document.body.classList.remove('light'); document.body.classList.add('dark');
        localStorage.setItem('fanterTheme', 'dark');
      }
      drawBackground();
    });

    function formatUrl(input) {
      let url = input.trim();
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
      return url;
    }

    function showIframe() {
      iframeContainer.classList.add('visible');
      mainContent.classList.add('has-iframe');
      iframeContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function loadViaProxy(url) {
      const encoded = encodeURIComponent(url);
      for (let proxy of [PROXY_URL, ...FALLBACK_PROXIES]) {
        try {
          const res = await fetch(proxy + encoded);
          if (res.ok) {
            let html = await res.text();
            const base = url.match(/^https?:\/\/[^\/]+/)[0];
            html = html.replace('<head>', `<head><base href="${base}/">`);
            proxyFrame.srcdoc = html;
            iframeUrlSpan.textContent = url;
            return true;
          }
        } catch(e) {}
      }
      return false;
    }

    async function loadUrl(rawUrl) {
      const formatted = formatUrl(rawUrl);
      currentUrl = formatted;
      searchInput.value = formatted;
      iframeUrlSpan.textContent = 'Loading...';
      proxyFrame.srcdoc = '<html><body style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:40px;color:white;"><div style="text-align:center"><div class="spinner"></div>Loading Fanter Proxy...<br><small>First request may take 30-60 seconds</small></div></body></html>';
      showIframe();
      const success = await loadViaProxy(formatted);
      if (!success) {
        proxyFrame.srcdoc = `<html><body style="background:#1a1a1a;padding:40px;text-align:center;font-family:sans-serif;color:white;"><h3>❌ Cannot load ${formatted}</h3><p>Try the "Bypass" button with a different method.</p></body></html>`;
        iframeUrlSpan.textContent = `Failed: ${formatted}`;
      }
      localStorage.setItem('fanterLastUrl', formatted);
    }

    // ============================================================
    // TRUE about:blank BYPASS - stays as about:blank
    // ============================================================
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.position = 'fixed';
      toast.style.bottom = '80px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#4a6e4a';
      toast.style.color = 'white';
      toast.style.padding = '10px 20px';
      toast.style.borderRadius = '30px';
      toast.style.fontSize = '12px';
      toast.style.zIndex = '2000';
      toast.style.fontFamily = 'monospace';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // TRUE about:blank method - creates a sandboxed about:blank window
    function openAboutBlank(url) {
      // Create a new about:blank window
      const blankWindow = window.open('about:blank', '_blank');
      
      if (!blankWindow) {
        alert('Popup blocked! Please allow popups for this site.');
        return;
      }
      
      // Write content to the about:blank window
      blankWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Fanter Proxy - ${url}</title>
          <style>
            body {
              margin: 0;
              padding: 0;
              height: 100vh;
              overflow: hidden;
            }
            iframe {
              width: 100%;
              height: 100%;
              border: none;
            }
            .loading {
              position: fixed;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              text-align: center;
              font-family: monospace;
              color: #4a6e4a;
            }
            .spinner {
              width: 40px;
              height: 40px;
              border: 3px solid #4a6e4a;
              border-top-color: transparent;
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
              margin: 0 auto 15px;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
          </style>
        </head>
        <body>
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading ${url}...</p>
          </div>
          <iframe id="proxyFrame" src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
          <script>
            // Hide loading when iframe loads
            const iframe = document.getElementById('proxyFrame');
            const loading = document.querySelector('.loading');
            iframe.onload = () => { loading.style.display = 'none'; };
            // Fallback: if iframe fails, show direct link
            setTimeout(() => {
              if (loading.style.display !== 'none') {
                loading.innerHTML = '<p>Loading taking too long. <a href="${url}" target="_blank">Click here</a> to open directly.</p>';
              }
            }, 8000);
          <\/script>
        </body>
        </html>
      `);
      
      showToast('🔓 Opened in about:blank sandbox!');
    }

    // JavaScript Popup method
    function openPopup(url) {
      const popup = window.open('', '_blank');
      if (!popup) { alert('Popup blocked! Allow popups for this site.'); return; }
      popup.document.write(`
        <!DOCTYPE html>
        <html>
        <head><title>Fanter Proxy</title></head>
        <body>
          <script>window.location.href="${url}";<\/script>
        </body>
        </html>
      `);
      showToast('🔓 Opened with JavaScript Popup method');
    }

    // data: URL method
    function openDataUrl(url) {
      const redirectHtml = `<!DOCTYPE html><html><head><title>Fanter Proxy</title></head><body><script>window.location.href="${url}";<\/script></body></html>`;
      const dataUrl = 'data:text/html,' + encodeURIComponent(redirectHtml);
      window.open(dataUrl, '_blank');
      showToast('🔓 Opened with data: URL method');
    }

    // Direct method
    function openDirect(url) {
      window.open(url, '_blank');
      showToast('🔓 Opened in new tab (direct)');
    }

    function openBypass() {
      let url = currentUrl;
      if (!url) url = formatUrl(searchInput.value);
      const method = bypassMethodSelect.value;
      
      switch(method) {
        case 'blank': openAboutBlank(url); break;
        case 'popup': openPopup(url); break;
        case 'data': openDataUrl(url); break;
        case 'direct': openDirect(url); break;
        default: openAboutBlank(url);
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        iframeContainer.requestFullscreen().then(() => {
          document.addEventListener('fullscreenchange', handleFullscreenChange);
          cursorLockHint.classList.add('visible');
          iframeContainer.requestPointerLock();
        }).catch(err => console.log('Fullscreen error:', err));
      } else {
        document.exitFullscreen();
      }
    }

    function handleFullscreenChange() {
      if (!document.fullscreenElement) {
        cursorLockHint.classList.remove('visible');
        document.exitPointerLock?.();
        document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }
    }

    function refreshIframe() { if (currentUrl) loadUrl(currentUrl); }

    function buildDropdown() {
      dropdownMenu.innerHTML = '';
      quickLinks.forEach(link => {
        const item = document.createElement('div');
        item.className = 'quicklink-item';
        item.innerHTML = `<img class="quicklink-icon" src="${link.icon}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%234a6e4a%22%3E%3Cpath d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z%22/%3E%3C/svg%3E'"><span class="quicklink-name">${link.name}</span>`;
        item.addEventListener('click', () => { searchInput.value = link.url; loadUrl(link.url); dropdownMenu.classList.remove('open'); dropdownArrow.classList.remove('open'); });
        dropdownMenu.appendChild(item);
      });
    }

    dropdownTrigger.addEventListener('click', (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('open'); dropdownArrow.classList.toggle('open'); });
    document.addEventListener('click', (e) => { if (!dropdownTrigger.contains(e.target)) { dropdownMenu.classList.remove('open'); dropdownArrow.classList.remove('open'); } });

    goBtn.addEventListener('click', () => { if (searchInput.value.trim()) loadUrl(searchInput.value); });
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadUrl(searchInput.value); });
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    refreshBtn.addEventListener('click', refreshIframe);
    directTabBtn.addEventListener('click', openBypass);

    initPoints();
    animateBackground();
    buildDropdown();
    initTheme();
    const last = localStorage.getItem('fanterLastUrl');
    if (last) searchInput.value = last;
    console.log('🔥 Fanter Search ready — ');
  </script>
</body>
</html>
