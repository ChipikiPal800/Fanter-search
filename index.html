<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter Search | Browse Freely</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.2s ease;
      overflow-x: hidden;
      position: relative;
    }

    /* Themes */
    body.dark { background: #1a1a1a; color: #e0e0e0; }
    body.light { background: #e8e8e8; color: #1a2e1a; }
    body.dark-green { background: #0d1f0d; color: #c0e0c0; }
    body.purple { background: #1a0a2e; color: #d0c0e0; }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
    }

    .main-content.has-iframe { justify-content: flex-start; padding-top: 20px; }

    /* Header Bar */
    .header-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      z-index: 50;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-small {
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(135deg, #4a6e4a, #6a8e6a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    .status-online { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
    .status-warning { background: #fbbf24; }
    .status-offline { background: #ef4444; }

    .proxy-status {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .header-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 30px;
      padding: 5px 12px;
      color: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .panic-btn {
      background: #ef4444;
      color: white;
    }
    .panic-btn:hover { background: #dc2626; }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 5px 10px;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      z-index: 49;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tab {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      background: #4a6e4a;
      color: white;
    }

    .tab-close {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
    }

    .tab-close:hover { color: #ef4444; }

    .new-tab-btn {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Theme Selector */
    .theme-selector {
      position: fixed;
      bottom: 80px;
      left: 24px;
      background: rgba(30, 30, 35, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 8px 15px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .theme-option {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s;
    }
    .theme-option:hover { transform: scale(1.1); }
    .theme-dark { background: #1a1a1a; }
    .theme-light { background: #e8e8e8; }
    .theme-green { background: #0d1f0d; }
    .theme-purple { background: #1a0a2e; }

    /* Title */
    .title {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4a6e4a, #6a8e6a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Search Section */
    .search-section {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      transition: all 0.4s ease;
      text-align: center;
    }

    .main-content.has-iframe .search-section {
      max-width: 500px;
      margin-top: 60px;
      margin-bottom: 20px;
    }

    .search-engine-select {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .engine-btn {
      background: none;
      border: none;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      color: #888;
      transition: all 0.2s;
    }
    .engine-btn.active { background: #4a6e4a; color: white; }

    .search-wrapper {
      background: white;
      border-radius: 60px;
      display: flex;
      align-items: center;
      padding: 6px;
      transition: all 0.3s;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.dark .search-wrapper,
    body.dark-green .search-wrapper,
    body.purple .search-wrapper {
      background: #2a2a2a;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .search-wrapper input {
      flex: 1;
      border: none;
      padding: 14px 20px;
      font-size: 1rem;
      background: transparent;
      outline: none;
      font-family: inherit;
      color: #1a2e1a;
    }

    body.dark .search-wrapper input,
    body.dark-green .search-wrapper input,
    body.purple .search-wrapper input { color: #e0e0e0; }

    .search-wrapper input::placeholder { color: #aaa; font-style: italic; }

    .search-wrapper button {
      background: #4a6e4a;
      border: none;
      border-radius: 50px;
      padding: 8px 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* History Panel */
    .history-panel {
      position: fixed;
      right: 20px;
      top: 100px;
      width: 260px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 12px;
      z-index: 200;
      transform: translateX(300px);
      transition: transform 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .history-panel.open { transform: translateX(0); }

    .history-title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      padding: 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
      word-break: break-all;
    }
    .history-item:hover { background: rgba(255, 255, 255, 0.1); }

    .clear-history {
      margin-top: 10px;
      text-align: center;
      font-size: 10px;
      color: #ef4444;
      cursor: pointer;
    }

    /* Shortcuts hint */
    .shortcuts-hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #555;
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 100;
    }

    /* Iframe Container */
    .iframe-container {
      width: 90%;
      max-width: 1300px;
      margin: 30px auto 20px;
      border-radius: 24px;
      background: #1a1a1a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transform: scale(0.95);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      pointer-events: none;
    }

    .iframe-container.visible {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .iframe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
    }

    .iframe-url {
      font-size: 12px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      color: #8aaa8a;
    }

    .iframe-buttons { display: flex; gap: 8px; }

    .iframe-btn {
      background: none;
      border: none;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
      color: #8aaa8a;
    }
    .iframe-btn:hover { background: #3a4a3a; }

    .mode-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #4a6e4a;
      color: white;
    }

    iframe { width: 100%; height: 65vh; border: none; display: block; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74, 110, 74, 0.2);
      border-top-color: #4a6e4a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .title { font-size: 2rem; }
      .header-bar { flex-direction: column; align-items: stretch; }
      .history-panel { width: 90%; right: 5%; top: auto; bottom: 80px; }
    }
  </style>
</head>
<body class="dark">
  <canvas id="bgCanvas"></canvas>

  <!-- Header Bar -->
  <div class="header-bar">
    <div class="header-left">
      <div class="logo-small">🔍 FANTER SEARCH</div>
      <div class="proxy-status" id="proxyStatus">
        <span class="status-dot status-warning" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="historyBtn">📜 History</button>
      <button class="header-btn" id="stealthModeBtn">👻 Stealth</button>
      <button class="header-btn panic-btn" id="panicBtn">😱 PANIC</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="0">🏠 Main</div>
    <div class="new-tab-btn" id="newTabBtn">+ New Tab</div>
  </div>

  <!-- Theme Selector -->
  <div class="theme-selector">
    <div class="theme-option theme-dark" data-theme="dark" title="Dark"></div>
    <div class="theme-option theme-light" data-theme="light" title="Light"></div>
    <div class="theme-option theme-green" data-theme="dark-green" title="Forest"></div>
    <div class="theme-option theme-purple" data-theme="purple" title="Purple"></div>
  </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel">
    <div class="history-title">📜 Recently Visited</div>
    <div class="history-list" id="historyList"></div>
    <div class="clear-history" id="clearHistory">Clear History</div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="search-section">
      <div class="title">Fanter Search</div>
      <div class="search-engine-select">
        <button class="engine-btn active" data-engine="google">🔍 Google</button>
        <button class="engine-btn" data-engine="ddg">🦆 DuckDuckGo</button>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search or type a URL...">
        <button id="goBtn">Go</button>
      </div>
      <div style="font-size: 10px; margin-top: 8px; opacity: 0.6;">
        💡 Tip: Ctrl+K = Search | Ctrl+T = New Tab | Ctrl+H = History | ` = Panic
      </div>
    </div>

    <div class="iframe-container" id="iframeContainer">
      <div class="iframe-header">
        <span class="iframe-url" id="iframeUrl">Ready</span>
        <div class="iframe-buttons">
          <span class="mode-badge" id="modeBadge">Proxy Mode</span>
          <button class="iframe-btn" id="textModeBtn">📄 Text Mode</button>
          <button class="iframe-btn" id="fullscreenBtn">⛶</button>
          <button class="iframe-btn" id="refreshBtn">⟳</button>
        </div>
      </div>
      <iframe id="proxyFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
    </div>
  </div>

  <div class="shortcuts-hint">
    🔥 Ctrl+K: Search | Ctrl+T: New Tab | Ctrl+H: History | ` : Panic
  </div>

  <script>
    // ============================================================
    // FANTER SEARCH — ALL FEATURES
    // ============================================================
    
    // Canvas Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let points = [], time = 0;

    function initPoints() {
      const w = window.innerWidth, h = window.innerHeight;
      canvas.width = w; canvas.height = h;
      const cols = Math.floor(w / 70), rows = Math.floor(h / 70);
      points = [];
      for (let i = 0; i <= cols; i++) {
        for (let j = 0; j <= rows; j++) {
          points.push({ baseX: i * 70, baseY: j * 70, offsetX: 0, offsetY: 0,
            phaseX: Math.random() * Math.PI * 2, phaseY: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 0.8 });
        }
      }
    }

    function drawBackground() {
      if (!ctx) return;
      const isDark = document.body.classList.contains('dark');
      ctx.fillStyle = isDark ? '#1c1c1c' : '#e8e8e8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let p of points) {
        p.offsetX = Math.sin(time * 0.002 * p.speed + p.phaseX) * 12;
        p.offsetY = Math.cos(time * 0.002 * p.speed * 0.7 + p.phaseY) * 12;
      }
      ctx.beginPath();
      ctx.strokeStyle = isDark ? 'rgba(100,100,100,0.25)' : 'rgba(120,120,120,0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = (points[i].baseX + points[i].offsetX) - (points[j].baseX + points[j].offsetX);
          const dy = (points[i].baseY + points[i].offsetY) - (points[j].baseY + points[j].offsetY);
          if (Math.sqrt(dx * dx + dy * dy) < 100) {
            ctx.beginPath();
            ctx.moveTo(points[i].baseX + points[i].offsetX, points[i].baseY + points[i].offsetY);
            ctx.lineTo(points[j].baseX + points[j].offsetX, points[j].baseY + points[j].offsetY);
            ctx.stroke();
          }
        }
      }
      ctx.fillStyle = isDark ? 'rgba(160,160,160,0.35)' : 'rgba(100,100,100,0.3)';
      for (let p of points) {
        ctx.beginPath();
        ctx.arc(p.baseX + p.offsetX, p.baseY + p.offsetY, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function animateBackground() { time++; drawBackground(); requestAnimationFrame(animateBackground); }
    window.addEventListener('resize', () => { initPoints(); drawBackground(); });

    // QuickLinks
    const quickLinks = [
      { name: 'YouTube', url: 'youtube.com' },
      { name: 'Reddit', url: 'reddit.com' },
      { name: 'Spotify', url: 'spotify.com' },
      { name: 'now.gg', url: 'now.gg' },
      { name: 'Xbox Cloud', url: 'xbox.com/play' },
      { name: 'GeForce NOW', url: 'play.geforcenow.com' }
    ];

    // Proxy URLs
    const PROXY_URL = 'https://fanter-search-proxy.onrender.com/proxy?url=';
    const FALLBACK_PROXIES = ['https://corsproxy.io/?url=', 'https://cors-anywhere.herokuapp.com/'];
    
    // State
    let currentUrl = '';
    let currentEngine = 'google';
    let stealthMode = false;
    let textMode = false;
    let history = JSON.parse(localStorage.getItem('fanterHistory') || '[]');
    let currentTab = 0;
    let tabs = [{ id: 0, url: '', title: 'Main' }];

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const goBtn = document.getElementById('goBtn');
    const iframeContainer = document.getElementById('iframeContainer');
    const proxyFrame = document.getElementById('proxyFrame');
    const iframeUrlSpan = document.getElementById('iframeUrl');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const textModeBtn = document.getElementById('textModeBtn');
    const modeBadge = document.getElementById('modeBadge');
    const mainContent = document.getElementById('mainContent');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const panicBtn = document.getElementById('panicBtn');
    const stealthModeBtn = document.getElementById('stealthModeBtn');
    const historyBtn = document.getElementById('historyBtn');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const newTabBtn = document.getElementById('newTabBtn');
    const tabBar = document.getElementById('tabBar');

    // Theme
    function setTheme(theme) {
      document.body.className = theme;
      localStorage.setItem('fanterTheme', theme);
      drawBackground();
    }
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.addEventListener('click', () => setTheme(opt.dataset.theme));
    });
    const savedTheme = localStorage.getItem('fanterTheme');
    if (savedTheme) setTheme(savedTheme);

    // Proxy status check
    async function checkProxyStatus() {
      statusText.textContent = 'Checking...';
      statusDot.className = 'status-dot status-warning';
      try {
        const res = await fetch(PROXY_URL + encodeURIComponent('https://example.com'));
        if (res.ok) {
          statusDot.className = 'status-dot status-online';
          statusText.textContent = 'Proxy Online';
        } else {
          statusDot.className = 'status-dot status-warning';
          statusText.textContent = 'Proxy Slow';
        }
      } catch(e) {
        statusDot.className = 'status-dot status-offline';
        statusText.textContent = 'Proxy Offline (fallbacks active)';
      }
    }
    setInterval(checkProxyStatus, 30000);
    checkProxyStatus();

    // History functions
    function addToHistory(url) {
      if (stealthMode) return;
      history = history.filter(h => h !== url);
      history.unshift(url);
      if (history.length > 20) history.pop();
      localStorage.setItem('fanterHistory', JSON.stringify(history));
      updateHistoryList();
    }
    function updateHistoryList() {
      historyList.innerHTML = '';
      history.forEach(url => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = url.length > 40 ? url.substring(0, 40) + '...' : url;
        item.onclick = () => loadUrl(url);
        historyList.appendChild(item);
      });
      if (history.length === 0) {
        historyList.innerHTML = '<div style="padding:8px;color:#666;">No history yet</div>';
      }
    }
    function clearHistory() {
      history = [];
      localStorage.setItem('fanterHistory', '[]');
      updateHistoryList();
      showToast('History cleared!');
    }
    clearHistoryBtn.onclick = clearHistory;
    historyBtn.onclick = () => historyPanel.classList.toggle('open');
    updateHistoryList();

    // Search engine
    document.querySelectorAll('.engine-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentEngine = btn.dataset.engine;
      });
    });

    function formatUrl(input) {
      let url = input.trim();
      // Check if it's a search query (no dots and not a URL)
      if (!url.includes('.') && !url.startsWith('http')) {
        if (currentEngine === 'google') return `https://www.google.com/search?q=${encodeURIComponent(url)}`;
        else return `https://duckduckgo.com/?q=${encodeURIComponent(url)}`;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
      return url;
    }

    function showIframe() {
      iframeContainer.classList.add('visible');
      mainContent.classList.add('has-iframe');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.position = 'fixed';
      toast.style.bottom = '100px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#4a6e4a';
      toast.style.color = 'white';
      toast.style.padding = '8px 16px';
      toast.style.borderRadius = '30px';
      toast.style.fontSize = '12px';
      toast.style.zIndex = '2000';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    async function loadViaProxy(url, isTextMode = false) {
      const encoded = encodeURIComponent(url);
      for (let proxy of [PROXY_URL, ...FALLBACK_PROXIES]) {
        try {
          const res = await fetch(proxy + encoded);
          if (res.ok) {
            let content = await res.text();
            if (isTextMode) {
              const textContent = content.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
                .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
              proxyFrame.srcdoc = `<html><body style="background:#1a1a1a;color:#e0e0e0;padding:20px;font-family:monospace;white-space:pre-wrap;">${escapeHtml(textContent.substring(0, 50000))}</body></html>`;
            } else {
              const base = url.match(/^https?:\/\/[^\/]+/)[0];
              content = content.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');
              content = content.replace('<head>', `<head><base href="${base}/">`);
              proxyFrame.srcdoc = content;
            }
            iframeUrlSpan.textContent = url;
            return true;
          }
        } catch(e) {}
      }
      return false;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadUrl(rawUrl) {
      const formatted = formatUrl(rawUrl);
      currentUrl = formatted;
      searchInput.value = rawUrl;
      iframeUrlSpan.textContent = 'Loading...';
      proxyFrame.srcdoc = '<html><body style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:40px;"><div class="spinner"></div></body></html>';
      showIframe();
      addToHistory(formatted);
      
      const success = await loadViaProxy(formatted, textMode);
      if (!success) {
        proxyFrame.srcdoc = `<html><body style="background:#1a1a1a;padding:40px;text-align:center;"><h3>❌ Cannot load ${formatted}</h3><p>Try using the "Bypass" button with a different method.</p></body></html>`;
        iframeUrlSpan.textContent = `Failed: ${formatted}`;
      }
      localStorage.setItem('fanterLastUrl', formatted);
    }

    // Text mode toggle
    textModeBtn.onclick = () => {
      textMode = !textMode;
      modeBadge.textContent = textMode ? 'Text Mode' : 'Proxy Mode';
      if (currentUrl) loadUrl(currentUrl);
      showToast(textMode ? 'Text Mode ON - ads and scripts removed' : 'Proxy Mode ON');
    };

    // Stealth mode
    stealthModeBtn.onclick = () => {
      stealthMode = !stealthMode;
      stealthModeBtn.style.background = stealthMode ? '#4a6e4a' : '';
      showToast(stealthMode ? 'Stealth Mode ON - No history saved' : 'Stealth Mode OFF');
    };

    // Panic button
    panicBtn.onclick = () => {
      iframeContainer.classList.remove('visible');
      mainContent.classList.remove('has-iframe');
      proxyFrame.src = 'about:blank';
      searchInput.value = '';
      currentUrl = '';
      document.body.style.opacity = '1';
      showToast('😱 Panic! Everything hidden!');
      setTimeout(() => {
        if (confirm('Exit panic mode?')) {
          document.body.style.opacity = '1';
        }
      }, 100);
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
        showToast('🔍 Search focused');
      }
      if (e.ctrlKey && e.key === 't') {
        e.preventDefault();
        showToast('📑 New tab feature - refresh page to reset');
      }
      if (e.ctrlKey && e.key === 'h') {
        e.preventDefault();
        historyPanel.classList.toggle('open');
      }
      if (e.key === '`') {
        e.preventDefault();
        panicBtn.click();
      }
    });

    // New tab
    newTabBtn.onclick = () => {
      showToast('📑 New tab - refresh to reset, or use multiple windows');
      window.open(window.location.href, '_blank');
    };

    // Fullscreen
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        iframeContainer.requestFullscreen().catch(err => console.log('Fullscreen error:', err));
      } else {
        document.exitFullscreen();
      }
    }
    fullscreenBtn.onclick = toggleFullscreen;
    refreshBtn.onclick = () => { if (currentUrl) loadUrl(currentUrl); };
    goBtn.onclick = () => { if (searchInput.value.trim()) loadUrl(searchInput.value); };
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadUrl(searchInput.value); });

    // Add quick links to dropdown
    const dropdownMenu = document.createElement('div');
    dropdownMenu.className = 'dropdown-menu';
    dropdownMenu.id = 'quickDropdown';
    document.querySelector('.dropdown-container')?.remove();
    const newDropdown = document.createElement('div');
    newDropdown.className = 'dropdown-container';
    newDropdown.innerHTML = `<div class="dropdown-trigger" id="dropdownTrigger">⚡ Quick Links <span class="dropdown-arrow">▼</span></div>`;
    newDropdown.appendChild(dropdownMenu);
    document.body.appendChild(newDropdown);
    
    quickLinks.forEach(link => {
      const item = document.createElement('div');
      item.className = 'quicklink-item';
      item.innerHTML = `<span class="quicklink-name">${link.name}</span>`;
      item.onclick = () => { loadUrl(link.url); dropdownMenu.classList.remove('open'); };
      dropdownMenu.appendChild(item);
    });
    
    document.getElementById('dropdownTrigger')?.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => dropdownMenu.classList.remove('open'));

    initPoints();
    animateBackground();
    const last = localStorage.getItem('fanterLastUrl');
    if (last) searchInput.value = last;
    console.log('🔥 Fanter Search ready — All features added!');
  </script>
</body>
</html>
