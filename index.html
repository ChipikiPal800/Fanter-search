<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter Search | Browse Freely</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.2s ease;
      overflow-x: hidden;
      position: relative;
    }

    /* Light Mode (default) */
    body.light {
      background: #eaf7ea;
      color: #1a2e1a;
    }

    /* Dark Mode */
    body.dark {
      background: #0a1a0a;
      color: #e0e0e0;
    }

    /* Background Canvas */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Main Content */
    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .main-content.has-iframe {
      justify-content: flex-start;
      padding-top: 20px;
    }

    /* Header with Theme Toggle */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: flex-end;
      padding: 20px 24px;
      z-index: 50;
      gap: 16px;
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 14px;
      color: inherit;
    }

    body.light .theme-toggle {
      background: white;
      border-color: rgba(0, 0, 0, 0.1);
      color: #1a2e1a;
    }

    body.dark .theme-toggle {
      background: rgba(30, 30, 40, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e0e0;
    }

    .theme-toggle:hover {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* Title */
    .title {
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1a5c1a, #2d8c2d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      text-align: center;
    }

    body.dark .title {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* Search Section */
    .search-section {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      transition: all 0.4s ease;
      text-align: center;
    }

    .main-content.has-iframe .search-section {
      max-width: 500px;
      margin-top: 0;
      margin-bottom: 20px;
    }

    /* Search Bar */
    .search-wrapper {
      background: white;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      padding: 6px;
      transition: all 0.3s;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.dark .search-wrapper {
      background: #1a2a1a;
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .search-wrapper:focus-within {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      transform: scale(1.01);
    }

    .search-wrapper input {
      flex: 1;
      border: none;
      padding: 16px 24px;
      font-size: 1rem;
      background: transparent;
      outline: none;
      font-family: inherit;
      color: #1a2e1a;
    }

    body.dark .search-wrapper input {
      color: #e0e0e0;
    }

    .search-wrapper input::placeholder {
      color: #a3c2a3;
      font-style: italic;
    }

    body.dark .search-wrapper input::placeholder {
      color: #5a7a5a;
    }

    .search-wrapper button {
      background: #2d8c2d;
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .search-wrapper button:hover {
      background: #1f6e1f;
      transform: scale(0.97);
    }

    /* Dropdown (Right Side) */
    .dropdown-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
    }

    .dropdown-trigger {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    body.dark .dropdown-trigger {
      background: #1a2a1a;
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e0e0;
    }

    .dropdown-trigger:hover {
      background: #f0f7f0;
      border-color: #2d8c2d;
    }

    body.dark .dropdown-trigger:hover {
      background: #2a3a2a;
    }

    .dropdown-arrow {
      transition: transform 0.3s ease;
    }

    .dropdown-arrow.open {
      transform: rotate(180deg);
    }

    .dropdown-menu {
      position: absolute;
      top: 60px;
      right: 0;
      width: 280px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.25s ease;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    body.dark .dropdown-menu {
      background: #1a2a1a;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .dropdown-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .quicklink-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
    }

    body.dark .quicklink-item {
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }

    .quicklink-item:last-child {
      border-bottom: none;
    }

    .quicklink-item:hover {
      background: #f4fbf4;
    }

    body.dark .quicklink-item:hover {
      background: #2a3a2a;
    }

    .quicklink-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 6px;
    }

    .quicklink-name {
      font-weight: 500;
      flex: 1;
    }

    /* Iframe Container */
    .iframe-container {
      width: 90%;
      max-width: 1300px;
      margin: 30px auto 20px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      transform: scale(0.95);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      pointer-events: none;
    }

    body.dark .iframe-container {
      background: #0f1a0f;
    }

    .iframe-container.visible {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .iframe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #f8faf8;
      border-bottom: 1px solid #e0ede0;
    }

    body.dark .iframe-header {
      background: #0f1a0f;
      border-bottom-color: #2a3a2a;
    }

    .iframe-url {
      font-size: 13px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      color: #4a674a;
    }

    body.dark .iframe-url {
      color: #8aaa8a;
    }

    .iframe-buttons {
      display: flex;
      gap: 12px;
    }

    .iframe-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
      transition: all 0.2s;
      color: #2d5a2d;
    }

    body.dark .iframe-btn {
      color: #8aaa8a;
    }

    .iframe-btn:hover {
      background: #e0ede0;
    }

    body.dark .iframe-btn:hover {
      background: #2a3a2a;
    }

    iframe {
      width: 100%;
      height: 65vh;
      border: none;
      display: block;
    }

    /* Fullscreen */
    .iframe-container.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      border-radius: 0;
      z-index: 1000;
    }

    .iframe-container.fullscreen iframe {
      height: 100vh;
    }

    /* Cursor Lock Hint */
    .cursor-lock-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      pointer-events: none;
      z-index: 1100;
      opacity: 0;
      transition: opacity 0.3s;
      font-family: monospace;
    }

    .cursor-lock-hint.visible {
      opacity: 1;
    }

    /* Welcome Screen */
    .welcome {
      text-align: center;
      padding: 60px 20px;
    }

    .welcome-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .welcome h2 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .welcome p {
      color: #666;
      max-width: 400px;
      margin: 0 auto;
    }

    body.dark .welcome p {
      color: #aaa;
    }

    /* Loading */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(45, 140, 45, 0.2);
      border-top-color: #2d8c2d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 680px) {
      .title { font-size: 2rem; }
      .search-wrapper input { padding: 12px 18px; }
      .dropdown-menu { width: 260px; }
      .header { padding: 16px; }
    }
  </style>
</head>
<body class="dark">
  <!-- Background Canvas (shifting dots & lines) -->
  <canvas id="bgCanvas"></canvas>

  <!-- Header with Theme Toggle -->
  <div class="header">
    <div class="theme-toggle" id="themeToggle">🌓 Dark/Light</div>
  </div>

  <!-- Dropdown Menu (Right side) -->
  <div class="dropdown-container">
    <div class="dropdown-trigger" id="dropdownTrigger">
      <span>⚡ Quick Links</span>
      <span class="dropdown-arrow" id="dropdownArrow">▼</span>
    </div>
    <div class="dropdown-menu" id="dropdownMenu"></div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="search-section">
      <div class="title">Fanter Search</div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="type a link here, everythings unblocked :3">
        <button id="goBtn">Go</button>
      </div>
    </div>

    <!-- Iframe Container -->
    <div class="iframe-container" id="iframeContainer">
      <div class="iframe-header">
        <span class="iframe-url" id="iframeUrl">Ready</span>
        <div class="iframe-buttons">
          <button class="iframe-btn" id="fullscreenBtn" title="Fullscreen (cursor locked)">⛶</button>
          <button class="iframe-btn" id="refreshBtn" title="Refresh">⟳</button>
        </div>
      </div>
      <iframe id="proxyFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>

  <div class="cursor-lock-hint" id="cursorLockHint">🔒 Press ESC to exit fullscreen / unlock cursor</div>

  <script>
    // ============================================================
    // FANTER SEARCH — DARK/LIGHT MODE + SHIFTING DOTS & LINES
    // ============================================================
    
    // ---------- SHIFTING BACKGROUND (Animated dots & lines) ----------
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];
    let time = 0;
    let animationId;

    function initPoints() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      
      const cols = Math.floor(width / 70);
      const rows = Math.floor(height / 70);
      points = [];
      for (let i = 0; i <= cols; i++) {
        for (let j = 0; j <= rows; j++) {
          points.push({
            baseX: i * 70,
            baseY: j * 70,
            offsetX: 0,
            offsetY: 0,
            phaseX: Math.random() * Math.PI * 2,
            phaseY: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 0.8
          });
        }
      }
    }

    function drawBackground() {
      if (!ctx) return;
      const isDark = document.body.classList.contains('dark');
      
      // Clear with appropriate background color
      ctx.fillStyle = isDark ? '#0a1a0a' : '#eaf7ea';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Update point positions with smooth drifting
      for (let p of points) {
        p.offsetX = Math.sin(time * 0.002 * p.speed + p.phaseX) * 12;
        p.offsetY = Math.cos(time * 0.002 * p.speed * 0.7 + p.phaseY) * 12;
      }
      
      // Draw lines between nearby points
      ctx.beginPath();
      ctx.strokeStyle = isDark ? 'rgba(100, 150, 100, 0.35)' : 'rgba(200, 220, 200, 0.7)';
      ctx.lineWidth = 1.2;
      
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = (points[i].baseX + points[i].offsetX) - (points[j].baseX + points[j].offsetX);
          const dy = (points[i].baseY + points[i].offsetY) - (points[j].baseY + points[j].offsetY);
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(points[i].baseX + points[i].offsetX, points[i].baseY + points[i].offsetY);
            ctx.lineTo(points[j].baseX + points[j].offsetX, points[j].baseY + points[j].offsetY);
            ctx.stroke();
          }
        }
      }
      
      // Draw larger dots (5px radius)
      ctx.fillStyle = isDark ? 'rgba(150, 200, 150, 0.6)' : 'rgba(180, 210, 180, 0.8)';
      for (let p of points) {
        ctx.beginPath();
        ctx.arc(p.baseX + p.offsetX, p.baseY + p.offsetY, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animateBackground() {
      time++;
      drawBackground();
      animationId = requestAnimationFrame(animateBackground);
    }

    window.addEventListener('resize', () => {
      initPoints();
      drawBackground();
    });

    // ---------- QUICKLINKS DATA ----------
    const quickLinks = [
      { name: 'YouTube', url: 'youtube.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdYYtpbk4xqsn2XvBocnTZjLJH2vsbPhYbRQ&s' },
      { name: 'Reddit', url: 'reddit.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYw6dBUuV1YaVQ3oSdn0xDl4SwmtCn2dKKiA&s' },
      { name: 'Cloudmoon', url: 'cloudmoonapp.com', icon: 'https://img.utdstc.com/icon/12d/349/12d349d1cd13cc225122ccd090b211e69c79a84c5216e55689f55f382235e423:200' },
      { name: 'Spotify', url: 'spotify.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQP-SeOb6iBTaeMUiL_lj3ac3LKNYP5foHCAg&s' },
      { name: 'now.gg', url: 'now.gg', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRduQjU8n0k3kzifCT8BUXSGpg-hYRdxMUX5A&s' },
      { name: 'Xbox Cloud', url: 'xbox.com/play', icon: 'https://assets.play.xbox.com/playxbox/static/media/CloudGaming_LetterBox.scale-200.ef909bf4.png' },
      { name: 'GeForce NOW', url: 'play.geforcenow.com', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjQnPCY_I0L4_-bLIdU0CcuVkYTAPICicosQ&s' }
    ];

    // ---------- PROXY SETUP ----------
    const PROXY_URL = 'https://fanter-search-proxy.onrender.com/proxy?url=';
    const FALLBACK_PROXIES = [
      'https://corsproxy.io/?url=',
      'https://cors-anywhere.herokuapp.com/'
    ];
    
    let currentUrl = '';

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const goBtn = document.getElementById('goBtn');
    const iframeContainer = document.getElementById('iframeContainer');
    const proxyFrame = document.getElementById('proxyFrame');
    const iframeUrlSpan = document.getElementById('iframeUrl');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const mainContent = document.getElementById('mainContent');
    const cursorLockHint = document.getElementById('cursorLockHint');
    const themeToggle = document.getElementById('themeToggle');
    
    // Dropdown elements
    const dropdownTrigger = document.getElementById('dropdownTrigger');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const dropdownArrow = document.getElementById('dropdownArrow');

    // ---------- THEME TOGGLE ----------
    function initTheme() {
      const saved = localStorage.getItem('fanterTheme');
      if (saved === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
      }
      drawBackground(); // Refresh canvas colors
    }

    themeToggle.addEventListener('click', () => {
      if (document.body.classList.contains('dark')) {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('fanterTheme', 'light');
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('fanterTheme', 'dark');
      }
      drawBackground();
    });

    // Helper: format URL
    function formatUrl(input) {
      let url = input.trim();
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      return url;
    }

    function showIframe() {
      iframeContainer.classList.add('visible');
      mainContent.classList.add('has-iframe');
      iframeContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function loadViaProxy(url) {
      const encoded = encodeURIComponent(url);
      const proxyFull = PROXY_URL + encoded;
      try {
        const res = await fetch(proxyFull);
        if (res.ok) {
          const html = await res.text();
          const base = url.match(/^https?:\/\/[^\/]+/)[0];
          const fixed = html.replace('<head>', `<head><base href="${base}/">`);
          proxyFrame.srcdoc = fixed;
          iframeUrlSpan.textContent = url;
          return true;
        }
      } catch(e) {
        for (let fb of FALLBACK_PROXIES) {
          try {
            const fallbackRes = await fetch(fb + encoded);
            if (fallbackRes.ok) {
              const html = await fallbackRes.text();
              const base = url.match(/^https?:\/\/[^\/]+/)[0];
              const fixed = html.replace('<head>', `<head><base href="${base}/">`);
              proxyFrame.srcdoc = fixed;
              iframeUrlSpan.textContent = url;
              return true;
            }
          } catch(e2) {}
        }
      }
      return false;
    }

    async function loadUrl(rawUrl) {
      const formatted = formatUrl(rawUrl);
      currentUrl = formatted;
      searchInput.value = formatted;
      
      iframeUrlSpan.textContent = 'Loading...';
      proxyFrame.srcdoc = '<html><body style="background:#eaf7ea;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:40px;"><div style="text-align:center"><div class="spinner" style="margin:0 auto 20px;"></div>Loading via Fanter Proxy...<br><small>First request may take 30-60 seconds (waking up)</small></div></body></html>';
      showIframe();
      
      const success = await loadViaProxy(formatted);
      if (!success) {
        proxyFrame.srcdoc = `<html><body style="background:#eaf7ea;padding:40px;text-align:center;font-family:sans-serif;"><h3>❌ Cannot load ${formatted}</h3><p>Possible reasons:<br>- Render proxy is waking up (30-60 sec)<br>- Site blocks proxies<br>- Try again in a moment</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#2d8c2d;color:white;border:none;border-radius:30px;cursor:pointer">Retry</button></body></html>`;
        iframeUrlSpan.textContent = `Failed: ${formatted}`;
      }
      localStorage.setItem('fanterLastUrl', formatted);
    }

    // Fullscreen + Cursor Lock
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        iframeContainer.requestFullscreen().then(() => {
          document.addEventListener('fullscreenchange', handleFullscreenChange);
          cursorLockHint.classList.add('visible');
          iframeContainer.requestPointerLock();
        }).catch(err => console.log('Fullscreen error:', err));
      } else {
        document.exitFullscreen();
      }
    }

    function handleFullscreenChange() {
      if (!document.fullscreenElement) {
        cursorLockHint.classList.remove('visible');
        document.exitPointerLock?.();
        document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }
    }

    function refreshIframe() {
      if (currentUrl) loadUrl(currentUrl);
    }

    // Dropdown
    function buildDropdown() {
      dropdownMenu.innerHTML = '';
      quickLinks.forEach(link => {
        const item = document.createElement('div');
        item.className = 'quicklink-item';
        item.innerHTML = `
          <img class="quicklink-icon" src="${link.icon}" alt="${link.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%232d8c2d%22%3E%3Cpath d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z%22/%3E%3C/svg%3E'">
          <span class="quicklink-name">${link.name}</span>
        `;
        item.addEventListener('click', () => {
          searchInput.value = link.url;
          loadUrl(link.url);
          dropdownMenu.classList.remove('open');
          dropdownArrow.classList.remove('open');
        });
        dropdownMenu.appendChild(item);
      });
    }

    dropdownTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('open');
      dropdownArrow.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!dropdownTrigger.contains(e.target)) {
        dropdownMenu.classList.remove('open');
        dropdownArrow.classList.remove('open');
      }
    });

    // Event Listeners
    goBtn.addEventListener('click', () => {
      const query = searchInput.value.trim();
      if (query) loadUrl(query);
    });
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadUrl(searchInput.value);
    });
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    refreshBtn.addEventListener('click', refreshIframe);

    // Initialize
    initPoints();
    animateBackground();
    buildDropdown();
    initTheme();

    // Load last URL from localStorage
    const last = localStorage.getItem('fanterLastUrl');
    if (last) searchInput.value = last;
    
    console.log('🔥 Fanter Search ready — Dark/Light mode, shifting dots & lines, larger dots!');
  </script>
</body>
</html>
