<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanter Search | Browse Freely</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1a, #0d1525);
      font-family: 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Header */
    .proxy-header {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid #fbbf24;
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 10px;
    }

    .logo span {
      color: #3b82f6;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 50px;
      border: 1px solid #fbbf24;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 16px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    .search-bar button {
      padding: 12px 25px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .search-bar button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(59,130,246,0.4);
    }

    .search-bar button.secondary {
      background: linear-gradient(135deg, #fbbf24, #d97706);
    }

    /* Info bar */
    .info-bar {
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status {
      color: #22c55e;
    }

    .warning {
      color: #fbbf24;
    }

    /* Iframe container */
    .iframe-container {
      height: calc(100vh - 130px);
      width: 100%;
      position: relative;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #fbbf24;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      padding: 5px 20px;
      font-size: 10px;
      color: #666;
      text-align: center;
      z-index: 90;
    }

    .footer a {
      color: #fbbf24;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="proxy-header">
    <div class="logo">Fanter <span>Search</span> 🔍</div>
    <div class="search-bar">
      <input type="text" id="urlInput" placeholder="Enter URL or search... (e.g., youtube.com, discord.com)">
      <button id="goBtn">🌐 Go</button>
      <button id="newTabBtn" class="secondary">📌 Open in New Tab</button>
    </div>
  </div>

  <div class="info-bar">
    <div class="status">🟢 Proxy Active</div>
    <div class="warning">⚠️ For educational purposes only. Use responsibly.</div>
    <div>🔒 Your activity is private</div>
  </div>

  <div class="iframe-container">
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-spinner"></div>
    </div>
    <iframe id="proxyFrame" src="about:blank"></iframe>
  </div>

  <div class="footer">
    <span>Fanter Search - Browse freely | <a href="#" id="clearBtn">Clear Cache</a> | <a href="#" id="homeBtn">Home</a></span>
  </div>

  <script>
    // ============================================================
    // FANTER SEARCH - Web Proxy
    // ============================================================
    
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const newTabBtn = document.getElementById('newTabBtn');
    const proxyFrame = document.getElementById('proxyFrame');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const clearBtn = document.getElementById('clearBtn');
    const homeBtn = document.getElementById('homeBtn');

    // Popular shortcuts
    const shortcuts = {
      'yt': 'youtube.com',
      'discord': 'discord.com',
      'reddit': 'reddit.com',
      'twitch': 'twitch.tv',
      'spotify': 'open.spotify.com',
      'roblox': 'roblox.com',
      'github': 'github.com',
      'gmail': 'mail.google.com',
      'drive': 'drive.google.com',
      'docs': 'docs.google.com'
    };

    // Format URL
    function formatUrl(input) {
      let url = input.trim().toLowerCase();
      
      // Check for shortcuts
      if (shortcuts[url]) {
        url = 'https://' + shortcuts[url];
      }
      
      // Add https:// if no protocol
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      
      return url;
    }

    // Load URL in iframe
    function loadUrl(url) {
      const formattedUrl = formatUrl(url);
      urlInput.value = formattedUrl;
      
      // Show loading
      loadingOverlay.classList.remove('hidden');
      
      // Load in iframe
      proxyFrame.src = formattedUrl;
      
      // Save to localStorage
      localStorage.setItem('lastProxyUrl', formattedUrl);
    }

    // Hide loading when iframe loads
    proxyFrame.addEventListener('load', () => {
      setTimeout(() => {
        loadingOverlay.classList.add('hidden');
      }, 500);
    });

    // Handle iframe errors
    proxyFrame.addEventListener('error', () => {
      loadingOverlay.classList.add('hidden');
      alert('❌ Cannot load this site. Some sites block iframes.\nTry opening in a new tab instead.');
    });

    // Go button
    goBtn.addEventListener('click', () => {
      const url = urlInput.value;
      if (url) {
        loadUrl(url);
      }
    });

    // Enter key
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loadUrl(urlInput.value);
      }
    });

    // Open in new tab
    newTabBtn.addEventListener('click', () => {
      const url = formatUrl(urlInput.value);
      window.open(url, '_blank');
    });

    // Clear cache
    clearBtn.addEventListener('click', () => {
      localStorage.removeItem('lastProxyUrl');
      proxyFrame.src = 'about:blank';
      urlInput.value = '';
      alert('✅ Cache cleared!');
    });

    // Home button
    homeBtn.addEventListener('click', () => {
      proxyFrame.src = 'about:blank';
      urlInput.value = '';
    });

    // Load last URL on startup
    const lastUrl = localStorage.getItem('lastProxyUrl');
    if (lastUrl) {
      urlInput.value = lastUrl;
      // Don't auto-load for privacy
    }

    // Update URL when iframe navigates (limited due to CORS)
    console.log('🔥 Fanter Search ready!');
  </script>
</body>
</html>
